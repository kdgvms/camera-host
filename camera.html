<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Camera</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  padding:20px;
}

video,img{
  width:100%;
  max-width:400px;
  border:2px solid #333;
  border-radius:8px;
}

button{
  margin-top:10px;
  padding:10px 20px;
  font-size:16px;
}
</style>
</head>

<body>

<h3>Visitor Camera</h3>

<video id="video" autoplay playsinline></video>
<img id="preview" style="display:none">

<br>

<button id="capBtn">📷 Capture</button>
<button id="useBtn" style="display:none">✅ Use Photo</button>

<canvas id="canvas" style="display:none"></canvas>

<script>

const video = document.getElementById("video");
const preview = document.getElementById("preview");
const capBtn = document.getElementById("capBtn");
const useBtn = document.getElementById("useBtn");

let finalImg = "";
  
async function startCam(){

  try{

    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    let constraints = {
      audio: false,
      video: true
    };

    // 📱 Mobile → Back Camera
    if(isMobile){
      constraints.video = {
        facingMode: { exact: "environment" }
      };
    }

    let stream;

    try {
      stream = await navigator.mediaDevices.getUserMedia(constraints);
    }
    catch(err){

      // 🔁 Fallback if exact back cam not supported
      if(isMobile){

        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" },
          audio: false
        });

      } else {

        stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });
      }
    }

    video.srcObject = stream;
    await video.play();

  }
  catch(e){

    alert("Camera Permission Required");
    console.log(e);
  }
}

startCam()
  
/* CAPTURE */
capBtn.onclick = ()=>{

  const canvas = document.getElementById("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  finalImg = canvas.toDataURL("image/png");

  preview.src = finalImg;
  preview.style.display="block";
  video.style.display="none";

  capBtn.style.display="none";
  useBtn.style.display="inline-block";
}

/* SEND BACK */
useBtn.onclick = ()=>{

  if(window.opener){

    window.opener.postMessage({
      type:"VMS_PHOTO",
      data: finalImg
    },"*");

  }

  window.close();
}

</script>

</body>
</html>
